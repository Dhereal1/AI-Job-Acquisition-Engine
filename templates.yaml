# Proposal and DM templates
# Variables: {name}, {skills}, {portfolio}, {timezone}, {availability}, {matched_keywords}, {role_hint}

templates:
  # Default / general backend
  default: |
    Hi! I saw your post and I'm interested.
    
    I'm a Python backend dev with focus on {role_hint}. My stack: {skills}.
    
    Relevant for this role: {matched_keywords}
    
    Portfolio: {portfolio}
    Timezone: {timezone} | Available: {availability}
    
    Happy to chat — what's the next step?

  # Telegram bot specific
  telegram_bot: |
    Hey! Your Telegram bot project caught my eye.
    
    I've built multiple production bots with aiogram/pyrogram — payment flows, admin panels, FSM, webhook deployments. I also have experience with {matched_keywords}.
    
    Stack: Python, FastAPI, aiogram 3.x, PostgreSQL, Redis, Docker.
    Portfolio: {portfolio}
    
    Can share examples directly. Available {availability}, {timezone}.

  # Web3 / TON specific
  web3_ton: |
    Hello! Interested in your Web3/TON role.
    
    I work on TON integrations — wallet connect, jetton transfers, NFT metadata, and backend APIs that interface with the chain. I also handle the bot/notification layer via Telegram.
    
    Tech: Python, FastAPI, TON SDK, aiogram, Docker. More at {portfolio}.
    
    {timezone} | Available {availability}. Let me know if you want to discuss scope.

  # AI / LLM / RAG specific
  ai_backend: |
    Hi! Your AI backend role looks like a strong fit.
    
    I build RAG pipelines, LLM-powered bots, and agent workflows — with FastAPI backends, vector DBs (Qdrant/Chroma), and Telegram as the interface layer. Currently working with: {matched_keywords}.
    
    Portfolio: {portfolio} | {timezone} | Available {availability}
    
    Open to a quick call to understand the scope better.

  # Automation / n8n specific
  automation: |
    Hey! Saw your automation role.
    
    I build workflow automations with n8n, custom webhooks, and Python scripts — integrating APIs, scraping pipelines, and notification systems. Stack overlaps with your post: {matched_keywords}.
    
    Portfolio: {portfolio} | {timezone} | {availability}

# Rules for auto-selecting a template
template_rules:
  - keywords: [ton, blockchain, wallet, web3, nft]
    template: web3_ton
  - keywords: [telegram, bot, aiogram, pyrogram]
    template: telegram_bot
  - keywords: [rag, llm, agent, ai, gpt, langchain, vector]
    template: ai_backend
  - keywords: [n8n, automation, workflow, zapier, make]
    template: automation
