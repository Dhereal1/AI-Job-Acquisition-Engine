# Telegram channels/groups to monitor
# Add channel usernames (without @) or IDs
# Use discovery mode first: python scripts/discover.py

channels:
  # Remote job boards
  - remocate          # Remocate job channel
  - python_jobs       # Python jobs
  - django_jobs       # Django/Python jobs
  - backend_jobs      # Backend jobs

  # Web3 / TON specific
  # - ton_jobs
  # - web3_jobs_eng

  # Automation / no-code
  # - n8n_community

  # Add more after running: python scripts/discover.py

# RSS feeds (polled every 30 min)
rss_feeds:
  - url: "https://remotive.com/remote-jobs/rss/software-dev"
    name: "Remotive Dev Jobs"
  - url: "https://weworkremotely.com/remote-jobs.rss"
    name: "WeWorkRemotely"
  - url: "https://himalayas.app/jobs/rss"
    name: "Himalayas"

# Polling interval in seconds
poll_interval: 300   # 5 minutes for Telegram
rss_interval: 1800   # 30 minutes for RSS
